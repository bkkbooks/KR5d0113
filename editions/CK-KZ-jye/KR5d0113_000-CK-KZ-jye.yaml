body:
  text: 絳宮天子統乾乾乾龍飛上九華天天中妙有無極宮宮中萬卷指玄篇篇篇皆露金丹旨千句萬句會一言教人只在尋汞鉛二物採入鼎中煎夜來火發崑崙山山頭火冷月光寒曲江之上金烏飛姮娥已與斗牛歡採之煉之未片餉一氣渺渺通三關三關來往氣無窮一道白脈朝泥丸泥丸之上紫金鼎鼎中一塊紫金團化爲玉漿流入口香甜淸爽遍舌端呑之服之入五內臟腑暢甚身康安赤蛇蒼龍交合時風恬浪靜虎龍蟠神水湛湛華池靜白雪紛紛飛四山七寶樓臺十二時樓前黃花深可觀卽此可爲鉛汞精化作精髓盈關源但去身中尋周天前弦之後後弦前藥物平平氣象足天地日月交會間虛空自然百雜碎嚼破混沌輭如綿番來復去成一錢遍體玉潤而金堅赤血換兮白血流金光滿室森森然一池秋水浸明水一朵金花如紅蓮此時身中神炁全不須求道復參禪我今知君如此賢知君有分爲神仙分明指示無多語默默運用而抽𣷹年中取月不用年月中取日月徒然日中取時時易日時中有刻而玄玄玄之又玄不可言元來朔望明晦弦金翁𡛥女奪造化神鬼哭泣驚相喧雲收雨散萬籟靜一粒玄珠種玉田十月火候聖胎圓九還七返相迴旋初時夾脊關脈開其次膀胱如火然內中兩腎如湯煎時乎挑動衝心源心腎水火自交感金木間隔誰使然黃庭一炁居中宮宰制萬象心掌權水源淸淸如玉鏡孰使河車如行船一霎火熖飛燒天烏魂兔魄成微塵如斯默默覓眞詮一路逕直入靈眞分明精裏以氣存漸漸氣積以生神此神乃是天地精純陽不死爲眞人若知如此宜修仙修仙惟有金丹門金丹亦無第二訣身中一畝爲家園涶涕精津氣血液七件陰物何取焉坎中非腎迺靈根潭底日紅北馬奔七返九還在片餉一切萬物皆生成惟此乾坤眞運用不必兀兀徒無言無心無念神已昏安得凝聚成胎仙胎仙只是交結成交結惟在頃刻間君還知有太陽回正在冬至幾日前又言金精旣降時復以何物復金精金精只在坤宮藥坤在西南爲川源蟾光終日照西川只此便是藥之根以時易日刻易時一滴甘露名靈泉呑入心中衝肺腧落在膀胱而成丹丹頭不在膀胱結元在膀胱卻在肝肝爲木液遇金精逢土交結成大還莫言此時有爲功又恐斯爲着相言始於著相至無相煉精化炁炁歸根氣之根本凝成神方曰無爲而有靈譬如夫婦交姤時一點精血結成嬰彼之以情而感情尙且嬰兒十月成何况宇宙在乎手身中虎嘯龍吟聲雖然不見龍之吟波浪高湧千萬尋雖然不見虎之嘯夜深風聲吼萬林自乎丹道凝結後以至火候烹煉深及於十月霜飛時神魂奔走安敢爭一年都計十二月卯酉沐浴誰敢行所以十月入神室金鼎滿滿龍津盈縛雲捉月之機關得訣修煉夫何難果然縛得雲在山又解捉住月之魂點頭此語知古人何慮不把身飛昇身之殼兮心之肉心中自有無價珍可以生我復死我旣能飢人亦飽人尋其毳路取其原逍遙快樂無飢寒似此景象與證驗總在一日工夫間工夫如此譬此閑藥不遠兮採不難誰音拍知火熖萬丈紅燒殺三尸玉爐寒丹田亦能生紫芝黃庭又以生紅𥽷紅𥽷一飧永不知紫芝一服常童顔滿身渾似白乳花金筋玉骨老不昏功成行滿鶴來至一舉便要登雲端古人有言得其一萬事畢噫誠哉是言也此吾所以删丹經之繁蕪標紫書之樞要蓋爲是也一也者金丹之基也實千經萬論之原千變萬化之祖也以要言之天魂地魄卽日精月華也紅鉛黑汞卽金精木液也烏兔卽龜蛇也馬牛卽龍虎也朱砂水銀乃黃芽白雪之骨也丹砂秋石乃白金黑錫之苗也別之爲男女夫婦體之爲金木水火類之爲靑幽徐揚象之爲乾坤坎離或曰河車者或云黃轝者或有言交梨火棗者或有言金砂玉汞者又如丁翁黃婆之名嬰兒𡛥女之號拆爲黑白分爲靑黃有如許之紛紛其實陰陽二字是皆一物也謂如守一壇戊已戸玄關一竅玄牝之門神水華池鉛爐土釜朱砂鼎偃月爐中黃宮丹元府神室氣府關元丹田呼吸之根凝結之所此又皆一處也復如冬夏二至春秋兩分卯酉甲庚弦望晦朔子午巳亥寅子坤申二十四氣七十二候一年交合一月周迴離坎之晴兔雞之月乾巽之穴二八之門朝屯暮蒙晝姤夜復人不知以爲果須依時按節推氣測候分拆數法准則銖爻故日視土圭夜瞻刻漏謬之甚矣又豈知周年造化乃周身之精炁日夜時刻乃精炁之變態也其中有衰有旺有升有降有浮有沈有淸有濁是以聖人以外象證之殊不知天地氣數在乎一時之工夫也所以中間有陰陽寒暑之證有生殺盈虧之狀小則按百刻大則如一年只在一時而然也然一時卽一處也一處卽一物也人知此之所以爲一則採取有法運用有度斤兩有則水火有等與夫抽𣷹進退之妙沐浴交結之奧無不防危慮險也若毫釐之失則日月失道金汞異爐非知造化之深者莫克知陰陽之義如是其祕也一陰一陽之謂道道卽金丹也金丹卽道也古仙上靈詔人煉七返九還金液大丹者是乃入道之捷徑耳故有片餉工夫自然交媾迴風混合百日工靈之語行之九月謂之九轉煉之一年謂之聖胎此其所以隱而不露者以上天祕惜不欲輕泄此道耳豈得無禍福於傳授賢否之間乎旣以唾涕精津氣血液爲陰物也又以泥丸丹田心腎脾肺尾閭夾脊口鼻非眞一處也何從而知金木之所以間隔水火之所以旣濟未濟者哉能以一之一字訂諸羣經參諸往哲勿以神氣爲自然歸復勿以禪定爲自然交合審能如是或恐暗合孫吳而終非捉百脈以歸源窮九關而徹底三火所聚八水同歸者也至於神入氣爲胎火煉藥成丹豈容易明有曰神衛氣者有曰神凝則氣聚者有曰神氣自然歸復者皓首茫然反起虛無之歎夫豈知丹基之眞一爲妙哉若將遊浮靈揖華佺於空蒙窅靄之上者得一可以畢萬故作丹基歸一論以付學者白玉蟾頴川陳泥丸太乙刀圭之說傅諸後古云奪取天機妙夜半看辰杓一些珠露阿誰運到稻花頭便向此時採取宛如碧蓮含蕊滴破玉池秋萬籟風初起明月一沙鷗紫河車乘赤鳳入瓊樓謂之玉汞與鉛與土正相投五氣三花聚頂吹着自然眞火煉得似紅榴十月胎仙出雷電送金虬紅蓮含蘂露珠凝碧飛落華池滴滴運歸金鼎喚丁公煉得似一枚朱橘三花噴火五雲擁月上有金胎神室洞房雲雨正春風十箇月胎仙了畢金丹大藥人人有要須是心傳口授一片白龍肝一盞醍醐酒只向離無尋坎有移卻南辰迴北斗好笑見金翁姹女兩箇厮鬭些兒鉛汞調匀觀漢月海潮抽𣷹火候一箭透三關方表神仙手兔子方來烏處住龜兒便把蛇呑了知否那兩箇鍾呂是吾師友半斤眞汞半斤鉛隱在靈源太極先須趁子時當採取煉成金液入丹田二神符白雪結玄珠此是金丹第一爐十二時辰須認子莫教金鼎汞花枯三水火相交虎遇龍金翁姹女兩爭雄靑去白來然後黑到紅方且入黃宮四玉爐三轉見黃芽火裏栽蓮解發花人在絳宮貪夜月一杯美酒餌丹砂五四轉紅爐轉四神𣷹符進火養胎精龍虎繞爐爭造化巽風吹起水中燈六五轉方成白馬芽卻教六賊運河車五行俱備雷聲震正好登樓看汞花七煉成金液玉神丹擒制龜蛇頃刻間已是中成消息處玉爐養火莫教寒八天上七星地七寶人有七竅權歸腦七返靈砂陰氣消鉛爐只使温温火九八轉神錦玉淸砂卯酉抽𣷹火不差渴飮華池飢嚼炁黃婆終日看金花十九轉紫金成至寶天門地戸自關鎻三百八十有四銖散爲三萬六千顆十一靑童把鏡照泥丸五臟祥雲徹上關子午寅申和巳亥胎圓數足出崑崙十二移將北斗向南辰穿過黃庭入紫庭攢簇一年眞造化太陽正照月三更十三上應星辰下應鉛太陽三十六爻躔不因法象無由採誰悟生于天地先十四黃丹胡粉密陀僧此是嘉州造化能若不見陽眞一法世間還有幾人曾十五紅鉛之髓名眞汞黑汞之精是正鉛莫向腎中求造化卻須心裏覓先天十六靈汞原非是水銀丹砂不赤太迷人此般眞物誰能識識者驂鸞脫世塵十七三種眞形一種稀結成靈異少人知莫言龍虎同源出便是神仙立兆基十八鎭星合得配中央偃水能交色變黃不比凡金銀與鐵成時全是賴陰陽十九莫近丘墳穢污田亦嫌戰地產人眠鍾來靈炁方爲福便是求仙小洞天二十山林靜處最宜良或在塵中或在鄕土得厚時丹得厚妄爲立見受迍殃二十一室宜向木對朝陽兌有明窗對夕光照顧有名人莫曉暮陰不得閉金牆二十二八門運化應時開進退隨金定往來莫息明爐幷北戸安然二鼎位三台二十三六百篇中起伏明三光須順日虛盈推移八卦明斤兩刻漏相參莫住程二十四陰火息時陽火消理分臥立順羲爻更隨黑白天邊月六候方終晦朔交二十五四時推運逐星杓晝夜停分百刻昭鄭重元君重定式細詳時候已明標二十六天上分明十二辰人間分作煉丹程若言刻漏無憑信不會玄機藥不成二十七心地虛閑絕萬縁且宜淸靜返身觀要知鐵脊梁之漢何慮修仙下手難二十八言者不知知不言高談濶論萬千般雖然眼下無人辨恐汝終身被自瞞二十九人如得道自嬰兒不辨閑言是與非君若不能心眼具他時追悔問他誰三十執着之人得不眞朝行暮輟又非誠誠心修煉見功驗方是人中識得人三十一父精母血結胎成尙自他形似我形身內認吾眞父母方纔捉得五行精三十二子時氣對尾閭關夾脊河車透頂門一顆水晶入爐內赤龍含汞上泥丸三十二氣入丹田養白鴉斯時方曰結黃芽華池神水含明月取得刀圭火似麻三十四須知藥得火成丹又要丹逢火則仙片餉工夫修便現老成須是過三年三十五大道分明在眼前時人不會悟歸泉黃芽本是乾坤炁神水根基與汞連三十六認得根源不用忙三三合九有純陽潛通變化神光現從此朝天近玉皇三十七合其天地合其元子母相逢不敢言先汞後鉛爲大道莫敎失伴鶴歸天三十八此寶從來二八傳吉年吉月入爐安千朝火候知時節必定芽成汞自完三十九志默忘言理自端更無一物可相關回眸謾着些兒力一得分明萬事閑四十紅鉛黑汞大丹基紅黑相投世罕知兩物若還成戊已仙家故曰一刀圭四十一日烏月兔兩輪圓根在先天核取難月夜望中能採取天魂地魄結靈丹四十二莫謂金丹事等閑切須勤苦力鑽硏慇勤好問師資學不在他邊在目前四十三未煉還丹先養鉛龜蛇一氣產先天虛心實腹方和合結就靈砂一粒圓四十四同行同坐又同眠終日相隨在目前認得這些須急採見之便是水鄕鉛四十五不是燈光日月星藥靈自有異常明垂簾久視光明處一顆堂堂現本眞四十六終日如愚豈有無謾將閑裏着工夫初時玉液飛空雪漸見流金滿故廬四十七靈汞通眞變化多只宜存守不宜過神符默運三關徹鉛趁黃河入大羅四十八甲龍庚虎鎭相隨鉛汞同爐始可爲會取地天交泰事自然交媾坎和離四十九周天火候至幽微運動抽𣷹盡有時氣候何須分八節只防片餉失毫釐五十五行四象坎幷離詩訣分明說與伊只有工夫下手處幾人會得幾人知五十一若未逢師且看詩詩中藏訣好修持雖然不到蓬萊路也得人間死較遲五十二書運靈旗夜火芝抽𣷹運用且防危若無同志相規覺時恐爐中火候非五十三震卦行歸西兌鄕三陽姹女弄明璫巽風吹動珊瑚樹入艮歸坤又一場五十四握拳閉目守流珠這箇元來是入途不見悟眞篇內說眞金起屋幾時枯五十五誰知前短後長機十二時中只一時晦朔望弦明進退煉成九轉結嬰兒五十六崑崙山上火星飛金木交滋坎電時藥到月圓須滿稱急教進火莫蹉遲五十七大藥須憑神氣精採來一處結交成丹頭只是先天炁煉作黃芽發玉英五十八分明只在片言間老去殊途有易難先自刀圭言下悟漸收九轉大還丹五十九兩處擒來共一爐一泓眞水結眞酥刀圭滋味吞歸腹澆灌黃芽產玉符六十捉將百脈倒歸源自會天然汞見鉛大地山河皆至寶誰知身裏覓先天六十一宫中眼底火星飛雷電掀翻白雪垂身裏漏聲聞滴滴三尸精血可充飢六十二五行四象外邊尋只在當人一寸心運用陰陽成妙道直教瓦礫盡成金六十三偃月爐中煅坎離片時自有一刀圭寄言師祖張平叔萬聖千賢總在西六十四醉倒酣眠夢熟時滿船載寶過曹溪一纔識破丹基處放去收來總在伊六十五西南路上月華明大藥還從此處生記得古人詩一句曲江之上鵲橋橫六十六一月三旬一日同修丹法象奪天功交加二八爲丹母遠望徒勞覓虎龍六十七尾閭白氣貫丹田一顆眞珠輭似綿滿地冷光生玉笋兩池秋水漾紅蓮六十八鼎爐火候密推排煉得純陽炁上來地戸閉時骨體實天門漸積自然開六十九水爲靈府冲和液火是丹樞渾沌精會在宫中凝結處自然結蘂復生英七十男兒懷孕是胎仙只爲蟾光夜夜圓奪得天機眞造化身中自有玉淸天七十一鼎中朱橘亘天紅此是時時養火功元炁歸爐神不散春山春水自春風七十二金鼎先乾活水銀水銀乾了大丹成分明有箇長生藥點鐵成金不誤人七十三涕唾精津氣血液眞僞混淆須辨惑從無生有是藥材不可滯他虛幻物七十四經云變化在須臾迷者何求日月疎但守火爻三百刻產成一顆夜明珠七十五天源一派接崑崙最隱無過九曲灣百萬玉龍嘶不斷一江春月趁漁船七十六精神冥合炁歸時骨肉融和都不知關節自開通暢也形容光澤似嬰兒七十七分兩須當應兩弦此般法象合天淵回頭問取黃婆看何必區區待口傳七十八鉛汞之宗龍虎根玄牝之戸戊已門只向玉壺春色裏摘枝花去問羲軒七十九近則三朝遠九旬須知變化有時辰不知造化長生藥點汞成金也動人八十鼎鼎原無藥裏尋尋來出去一般金鑄成大小都隨意便是冰壺妙理深八十一入鼎須憑重一斤秤來卻是十六星一星水裏眞金妙合作流珠二八停八十二坎府㘭塘石腳泉斗星相對射高天潺湲陽脈通靑白沐浴須教金體堅八十三盡道眞人總默然如何也不示言詮若非驕傲事無語只是胸中欠汞鉛八十四天地初分日月高狀如雞子復如桃陰陽眞氣知時節直待三年脫戰袍八十五龍虎丹砂意最幽五神金內汞鉛流千朝變紫飛雲去直至大羅天上頭八十六用鉛須得汞相合二姓爲親女唱歌煉此紫河車地動白雲相伴鶴來過八十七紅黑相將婦嫁夫一年一度入丹樞洞房深處眞雲雨產箇嬰兒一似渠八十八坎男離女住乾天買藥燒丹不用錢偃月爐中烹造化一些妙藥要眞鉛八十九怪事教人笑幾回男兒今也會懷胎自家精血自交結身裏夫妻是妙哉九十三姓包含二物交赤龍飛上碧雲霄夜來甘露空中過片月凌空對鵲橋九十一復姤修持水火宗兔雞沐浴內丹紅周天六六寒爐後十月胎圓顯聖功九十二水火同精間木金火木知他甚處尋脫黃着紫因何事只爲河車數轉深九十三玉符金液煉天仙月照崑崙一沼蓮試指北方玄武事龜蛇因甚兩相纏九十四雨洗新篁雙鳳飛玉芝花下一靈龜抱琴彈盡無生曲卻訪姮娥宴小池九十五透體金光骨髓香金筋玉骨盡純陽煉教赤血流爲白陰氣消磨身自康九十六一旦工夫盡至誠凝神聚氣固眞精顔容如玉無饑渴方顯金丹片餉成九十七翠娥獨立水晶宫體態嬌嬈有意濃半夜黃婆來扣戸作媒嫁去與金翁九十八太乙玄珠金液丹還元返本駐童顔要須親聽明師語方可教君見一班九十九夜來一朶碧芙蕖內有紅丸滴滴珠滴下華池是神水丹田結聚作丹樞一百離坎名爲水火精本是乾坤二卦成但取坎精點離穴純乾便可攝飛瓊
