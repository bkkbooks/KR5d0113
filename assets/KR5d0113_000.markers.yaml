  - {type: variant, offset: 1129, length: 2780, content: 大道歌眞隂眞陽是眞道只在眼前何遠討凡流歲歲燒還丹或見青黄自云好志士應願承法則莫損心神須見道但知求得眞黄芽人得食之壽無老黄芽不與世鉛同徒以勞身不見功虚度光隂空白首何處悠悠訪赤松神水華池世所希流傳不與俗人知還將世上凡鉛汞相似令人迷不知青龍逐虎虎隨龍赤禽交會聲嗈嗈調氣運火逐禽宫丹砂入腹身沖沖五行深妙義難知龍虎隱藏在坎離還丹之術過數百最妙須得眞華池丹砂其位元非赤四季排來在南宅流珠本性無定居若識其原如秋石日魂月華二氣眞含胎育子自堪神變轉欲終君自見分明化作明窗塵鉛汞一門不可依金丹祕訣聖無知莫將世人凡鉛汞論年運火共相持天生二物應虚無爲妻爲子復爲夫三五之門爲日月能分卯酉别終初全養天然禀至神沖和之氣結成身富貴只縁懷五彩心知鉛汞共成親乾坤不互相爲避採取元和在天地十月養成子母分賢者何曾更運氣玄黄溟溟不可辯鉛汞之門義難顯世人不曉定其源細視五行定聽見嬰兒漠漠不可悟徒以勞神虚自苦但知會得聖人言即是分明天上路三四同居共一室一二夫妻爲偶匹要假良媒方得親遂使交遊情意宻浮沉恍惚往難辯悟取迷途年月遠欲知靈藥何日成陽數終須歸九轉隂陽冥寞不可知青龍白虎自相持年終變轉自相噉白虎制龍龍漸稀乾天爲父坤爲母南方朱雀北玄武年終歲久俱成土時人何處尋龍虎三人義合同爲宗常移日月照其中已遇三花金玉液九轉須終十月功青龍本質在東宫配合乾坤震位中白虎自兹相見後流珠那肯不相從龍虎修來五轉强爐中漸覺菊花香如今修鍊正當節莫使悠悠歲月長欲識丹砂是木精移來西位與金並凡人何處尋蹤跡恍惚中間互窅冥悟者猶如返故武迷途不易尋路若三人運合同一源本姓何曾離宗祖一人本有一人無金公爲婦木爲夫玄冥深遠不可度志士何曾肯强圖立天汪汪配地黄男精和合並同房白液爐户隨分化時人服者瑩心凉金木傷相誰定原五行相返自相連世上黄龍隂火白誰能識得黄芽鉛世上鉛汞不相依志士元知在坎離賢者共藏人不見准南修祕在華池九轉丹成歲欲終開爐欲見藥花紅水火變來俱作土時人何處覓金翁鉛汞相傳世所希丹砂爲質雪爲衣朦朧只在君家舍日日君看君不知還丹入口身自輕能消久病去妖精貪愛自兹無所染能改愚人世與情誰悟靈丹出世塵三花會合與龍親君看前後鍊丹者悮殺千人與萬人羅浮翠虛吟嘉定壬申八月秋翠虚道人在羅浮眼前萬事去如水天地何處一沙鷗吾將蛻形歸玉闕遂以金丹火候訣說與瓊山白玉蟾使之深識造化骨道光禪師薛紫賢付我歸根復命篇指示鉛汞兩箇字所謂眞的玄中玄辛苦都來只十月漸漸採取漸凝結而今通神是白血已覺四肢無寒熱後來依舊去參人勘破多少野狐精箇箇不是眞一處都是旁門不是眞恐君虚度此青春從頭一一爲君陳若非金液還丹訣不必空自勞精神有如迷者學採戰心心只向房中戀謂之隂丹御女方手按眉間吸氣嚥奪人精氣補吾身執著三峯信邪見産門唤作生身處九淺一深行幾遍軒后彭祖老容成黄谷壽光趙飛燕他家别有通霄路酒肆淫坊戲歷鍊莫言花裏遇神仙即把金篦换瓦片樹根已朽葉徒青氣海波翻死如箭其他有若諸旁門尚自可結安樂縁有如服氣爲中黄有如守頂爲混元有如運氣爲先天有如嚥液爲靈泉或者脾邊認一穴執定爲之呼吸根或者口鼻爲玄牝納清吐濁爲返還或者默朝高上帝心目上視守泥丸與彼存思氣升降以此謂之夾脊關與彼閉息吞津唾謂之玉液金液丹與彼存神守臍下與彼作念想眉間又如運心思脊骨又如合口柱舌端竦肩縮頸偃脊背唤作直入王京山口爲華池舌爲龍唤作神水流潺潺此箇旁門安樂法擬作天仙豈不難八十放九嚥其一聚氣歸臍謂胎息手持念珠數呼吸水壺土圭則時刻或依靈寳祕法行直勒尾閭嚥津液或參西山會眞記終日無言面對壁時人雖是學坐禪何曾月照寒潭碧時人雖是學抱元何曾如玉之在石或言大道本無爲枯木灰心孤默默或言已自顯現成試問幻身何處得更有勞形採日月謂之天魂與地魄更有終宵服七曜謂之造化眞血脉更有肘後飛金精氣自騰騰水滴滴更有太乙含眞氣心自冥冥賢寂寂有般循環運流珠有般靜定想朱橘如斯皆是養命方即非無質生靈質道要無中養就兒箇中别有眞端的都縁簡易妙天機散在丹書不肯洩可怜愚夫自執迷迷迷相指畫無無箇般詭怪顛狂輩坐中摇動顫多時屈伸偃仰千萬狀啼哭叫唤如兒嬉蓋縁方寸無主人氣虚氣散神狂飛一隊妄想爭唱鬨以此誑俗誘愚癡不知與道合其眞與鬼合邪徒妄爲一纔心動氣隨動跳躍顫掉運神機或曰此是陽氣來或曰龍虎爭戰時或曰河車千萬迎或曰水火相奔馳看看摇擺五臟氣一旦腦瀉精神羸當初神祖留丹訣無中生有作丹基何曾有此鬼怪狀盡是下士徒闡提我聞前代諸聖師無爲之中無不爲盡於無相生實相不假想化並行持則有些兒奇又奇心腎元來非坎离肝心脾肺腎腸膽只是空屋舊藩籬涕唾津精氣血液只可接助爲階梯精神魂魄心意氣觀之自是而實非何須内觀及鑑形或聽靈響視泓池吞霞飲露服元氣功效不驗心神疲演說清虚弄爐火索人投狀齎金寳敢將蛙草藐滄溟元始天尊即是我虚收銜號僞神通指劃鬼神說因果今朝明朝又奏名内丹外丹無不可欺賢罔聖昧三光自視禍福皆懡㦬招邀徒弟走市廛醉酒飽德成群夥大道從來絶名相眞仙本自無花草教他戒誓立辛勤爭如汝自辛勤好一人迷昧猶自可迷以傳迷迷至老此輩一盲引衆盲共入迷途眞憂惱忽朝福盡罪報來獲罪於天無所禱三元九府録其愆迫魄繫魄受冥考舉世人人喜學仙幾人日日去參玄各自妄誕自相高不務眞實爲眞詮古人好語須切記工夫純熟語通仙言語不通非眷屬工夫不到不方圓我昔工夫行一年六脉已息氣歸根有一嬰兒在丹田與我形貌亦如然飜思塵塵學道者三年九載空遷延依前雲水遊四海冷眼看有誰堪傳炷香問道仍下風勘辯邪正知愚賢歸來作此翠虚吟猶如杲日麗青天掃除末學小伎術分别火候鍊藥物只取一味水中金收拾虚無造化窟促將百脉盡歸源脉任氣停丹始結初時枯木依寒巖二獸相逢如電掣中央正位産玄珠浪靜風平雲雨歇半時之間見丹頭軟似綿團硬似鐵此時南方赤鳳血採之須要知時節一般纔得萬般全復命歸根眞孔穴内中自有眞壺天風物光明月皎潔龍吟虎嘯鉛汞交灼見黄芽芽白雪每常天地交合時奪取隂陽造化機卯酉甲庚須沐浴弦望晦朔要防危隨日隨時則斤兩抽添運用在怡怡十二時中只一時九還七返這些兒温養功須常固濟巽風常向坎中吹行坐寢食總如之性恐火冷丹力遲一年周天除卯酉九轉工夫月用九至於十月玉霜飛聖胎圓就風雷吼一載胎生一箇兒子生孫了又孫枝千百億化最妙處豈可容易教人知忘形死心絶爾汝存亡動靜分賔主朝昏藥物有浮沉水火爻符宜檢舉眞氣薰蒸無寒暑純陽流溢無生死有一子母分胎路妙在尾箕斗牛女若欲延年救老殘斷除淫欲行旁門果將流形永住世除非運火鍊神丹神丹之功三百日七解七蛻成大還聚則成形散成氣天上人間總一般寧可求師安樂法不可邪淫採精血古云天地悉皆歸須學無爲清淨訣縛住青山萬頃雲撈取碧潭一輪月玄關一竅無人知此是刀圭甚奇絶夜來撞見吕秀才有一丹訣猶奇哉却把太虚爲爐鼎活捉烏兔爲藥材山河大地發猛火於中萬象生雲雷昔時混沌今品物一時交結成聖胎也無金木相間隔也無龍虎分南北不問子母及雌雄不問夫妻及黑白何人名曰大還丹太上老君吞不得老君留與清閑客服了飛仙登太極更將一盞鴻濛酒餌此刀圭壯顔色任從滄海變桑田我道壺中未一年懸知汝心如鐵堅所以口口宻相傳妙處都無半句子神仙法度眞自然速須下手結胎仙朗吟歸去蓬萊天, CK-KZ: ''}
