front:
  text: 翠虛篇序婦三嘗觀張紫陽贈白鹿洞主之詩有曰聞君知藥已多年何不修心鍊汞鉛莫教燈被風吹滅六道輪回難怨天余讀至此掩卷拊膺喟然歎曰紫陽之語是為已知藥者發也况懵然乎故於晝三夜三常以風燈為警由是讀金圈栗棘之書者十年習金鉛木汞之事者又十年殆如嚼蠟雖欲尋出生死一路若蠅鑽窗然不覺忽及世矣及敬覽翠虛之篇復聆方外高士之至論始知採時唤為藥也鍊時唤為火也結時謂之丹養時謂之胎其實一也所産之處曰川源山海所藏之器曰壇爐鼎竈所稟之性故汞鉛水火之名所成之象故有丹砂玄珠之號以今觀之惟一物也良由古人剖析真元分别氣類所以有採取交會煅煉沐浴之説如易卦象無出乎乾周天星禽無出乎斗以抽添運用之細微遂有斤兩之論但觀天之月暈黑白察地之潮候消長則可默會日中取時之意於毫髮之際無差殊何患乎金翁不騎龍姹女不御虎也結丹頭於片餉之間産嬰兒於十月之內神凝氣聚身外有身此誠學仙之捷徑度世之妙道其精微簡要之語盡在乎翠虛一篇真息子王思誠謹焚香稽首再拜序翠虛篇
