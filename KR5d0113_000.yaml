body:
  text: 泥丸陳真人撰紫庭經絳宫天子統乾乾乾龍飛上九華天天中妙有無極宫宫中萬卷指玄篇篇篇皆露金丹旨千句萬句會一言教人只在尋汞鉛二物採入鼎中煎夜來火發昆崘山山頭火冷月光寒曲江之上金烏飛姮娥已與斗牛歡採之鍊之未片餉一氣渺渺通三關三關來往氣無窮一道白脈朝泥丸泥丸之上紫金鼎鼎中一塊紫金團化為玉漿流入口香甜清爽透舌端吞吞服服入五內臟腑暢甚身康安赤蛇蒼龍交合時風恬浪靜虎龍蟠神水湛湛華池靜白雪紛紛飛四山七賔樓臺十二時樓前黃花深可觀即此可謂鉛汞精化作精髓盈關源但去身中尋周天前弦以後後弦前藥物平平氣象足天地日月交會間虛空自然百雜碎嚼破混沌軟如綿番來覆去成一錢遍體玉潤而金堅赤血换兮白血流金光滿室森森然一池秋水浸明月一朵金花如紅蓮此時身中神氣全不須求道復參禪我今知君如此賢知君有分為神仙分明指示無兩語默默運用而抽添年中採月不用年月中取日月徒然日中取時時易日時中有刻而玄玄玄之又玄不可言元來朔望明晦弦金翁姹女奪造化神鬼哭泣驚相喧雲收雨散萬籟靜一粒玄珠種玉田十月火侯聖胎仙九轉九朔相迥旋初時夾脊關脈開其次膀胱如火然內中兩腎如湯煎時乎挑動衝心源心腎水火自交感金木間隔隨使然黃庭一氣居中宫宫制萬象心掌權水源清清如玉鏡孰使河車如行船一霎火焰飛燒天烏魂兔魄成微塵如斯默默覓真筌一路徑直入靈真分明精氣以氣存漸漸氣積以生神此神乃是天地精純陽不死為真人若知如此宜修仙修仙惟有金丹門金丹亦無第二訣身中一畒為家園唾涕精津氣血液七件隂物何正焉坎中非腎乃靈根潭底日紅北馬奔七返九還在片時一切萬物皆生成惟此乾坤真運用不必兀兀徒無言無心無念神已昏安得凝聚成胎仙胎仙只是交結成交結惟在頃刻間君還知有太陽回正在冬至幾日前又言金精既降時復以何物復金精金精只在坤宫藥坤在西南為川源蟾光終日照西川只此便是藥之根以時易日刻易時一滴甘露名靈泉吞入心中衝肺腧落在膀胱而成丹丹頭不在膀胱結元在膀胱却在肝肝為木液遇金精逢土交結成大還莫言此時有為功又恐斯為著相言始於著相始無相鍊精化氣氣歸根氣之根本凝成神方曰無為而通靈譬如夫婦交媾時一點精血結成嬰彼之以情而感情尚且嬰兒十月成何況宇宙在乎手身中虎嘯龍吟聲雖然不見龍之吟波浪高湧千萬尋雖然不見虎之嘯夜深風聲吼萬林自乎丹道凝結後以至火候烹鍊深及於十月霜飛時神魂奔走安敢爭一年都計十二月卯酉沐浴誰敢行所以十月入神室金鼎滿滿龍精盈縛雲捉月之機關得訣修鍊夫何難果然縛得雲在山又解捉住月之魂點頭此語知古人何慮不把身飛升身之殼兮心之內心中自有無價珍可以生我復死我既能飢人亦飽人尋其毳路取其原逍遙快樂無飢寒似此景象與證驗總在一日工夫間工夫如此譬似間藥不遠兮採不難誰知火候萬丈紅燒殺三尸玉爐寒丹田亦能生紫芝黃庭又以生紅檗紅檗一餐永不飢紫芝一服常童顔滿身渾是白乳花金筋玉骨老不昏功成行滿鶴來至一舉便要登雲端大道歌真隂真陽是真道只在眼前何遠討凡流歲歲燒還丹或見青黃自云好志士應願承法則莫損心神須見道但知求得真黃芽人得食之壽無老黃芽不與世鉛同徒以勞身不見功虛度光隂空白首何處悠悠訪赤松神水華池世所希流傳不與俗人知還將世上凡鉛汞相似令人迷不知青龍逐虎虎隨龍赤禽交會聲嗈嗈調氣運火逐禽宫丹砂入腹身沖沖五行深妙義難知龍虎隱藏在坎離還丹之術過數百最妙須得真華池丹砂其位元非赤四季排來在南宅流珠本性無定居若識其原如秋石日魂月華二氣真含胎育子自堪神變轉欲終君自見分明化作明窗塵鉛汞一門不可依金丹祕訣聖無知莫將世人凡鉛汞論年運火共相持天生二物應虛無為妻為子復為夫三五之門為日月能分卯酉别終初全養天然稟至神沖和之氣結成身富貴只緣懷五彩心知鉛汞共成親乾坤不互相為避採取元和在天地十月養成子母分賢者何曾更運氣玄黃溟溟不可辨鉛汞之門義難顯世人不曉定其源細視五行定聽見嬰兒漠漠不可悟徒以勞神虛自苦但知會得聖人言即是分明天上路三四同居共一室一二夫妻為偶匹要假良媒方得親遂使交遊情意密浮沉恍惚往難辨悟取迷途年月遠欲知靈藥何日成陽數終須歸九轉隂陽冥寞不可知青龍白虎自相持年終變轉自相噉白虎制龍龍漸稀乾天為父坤為母南方朱雀北玄武年終歲久俱成土時人何處尋龍虎三人義合同為宗常移日月照其中已遇三花金玉液九轉須終十月功青龍本質在東宫配合乾坤震位中白虎自兹相見後流珠那肯不相從龍虎修來五轉強爐中漸覺菊花香如今修鍊正當節莫使悠悠歲月長欲識丹砂是木精移來西位與金並凡人何處尋蹤迹恍惚中間互窅冥悟者猶如返故武迷途不易尋路若三人運合同一源本姓何曾離宗祖一人本有一人無金公為婦木為夫玄冥深遠不可度志士何曾肯強圖立天汪汪配地黃男精和合並同房白液爐户隨分化時人服者瑩心涼金木傷相誰定原五行相返自相連世上黃龍隂火白誰能識得黃芽鉛世上鉛汞不相依志士元知在坎離賢者共藏人不見準南修祕在華池九轉丹成歲欲終開爐欲見藥花紅水火變來俱作土時人何處覓金翁鉛汞相傳世所希丹砂為質雪為衣朦朧只在君家舍日日君看君不知還丹入口身自輕能消久病去妖精貪愛自兹無所染能改愚人世與情誰悟靈丹出世塵三花會合與龍親君看前後鍊丹者悮殺千人與萬人羅浮翠虛吟嘉定壬申八月秋翠虛道人在羅浮眼前萬事去如水天地何處一沙鷗吾將蛻形歸玉闕遂以金丹火候訣説與瓊山白玉蟾使之深識造化骨道光禪師薛紫賢付我歸根復命篇指示鉛汞兩箇字所謂真的玄中玄辛苦都來只十月漸漸採取漸凝結而今通神是白血已覺四肢無寒熱後來依舊去參人勘破多少野狐精箇箇不是真一處都是旁門不是真恐君虛度此青春從頭一一為君陳若非金液還丹訣不必空自勞精神有如迷者學採戰心心只向房中戀謂之隂丹御女方手按眉間吸氣咽奪人精氣補吾身執著三峯信邪見産門唤作生身處九淺一深行幾遍軒后彭祖老容成黃谷壽光趙飛燕他家别有通霄路酒肆淫坊戲歷鍊莫言花裏遇神仙即把金篦换瓦片樹根已朽葉徒青氣海波翻死如箭其他有若諸旁門尚自可結安樂緣有如服氣為中黃有如守頂為混元有如運氣為先天有如咽液為靈泉或者脾邊認一穴執定為之呼吸根或者口鼻為玄牝納清吐濁為返還或者默朝高上帝心目上視守泥丸與彼存思氣升降以此謂之夾脊關與彼閉息吞津唾謂之玉液金液丹與彼存神守臍下與彼作念想眉間又如運心思脊骨又如合口柱舌端竦肩縮頸偃脊背唤作直入王京山口為華池舌為龍唤作神水流潺潺此箇旁門安樂法擬作天仙豈不難八十放九咽其一聚氣歸臍謂胎息手持念珠數呼吸水壺土圭則時刻或依靈寶祕法行直勒尾閭咽津液或參西山會真記終日無言面對壁時人雖是學坐禪何曾月照寒潭碧時人雖是學抱元何曾如玉之在石或言大道本無為枯木灰心孤默默或言已自顯現成試問幻身何處得更有勞形採日月謂之天魂與地魄更有終宵服七曜謂之造化真血脈更有肘後飛金精氣自騰騰水滴滴更有太乙含真氣心自冥冥賢寂寂有般循環運流珠有般靜定想朱橘如斯皆是養命方即非無質生靈質道要無中養就兒箇中别有真端的都緣簡易妙天機散在丹書不肯泄可憐愚夫自執迷迷迷相指畫無無箇般詭怪顛狂輩坐中搖動顫多時屈伸偃仰千萬狀啼哭叫唤如兒嬉蓋緣方寸無主人氣虛氣散神狂飛一隊妄想爭唱鬨以此誑俗誘愚癡不知與道合其真與鬼合邪徒妄為一才心動氣隨動跳躍顫掉運神機或曰此是陽氣來或曰龍虎爭戰時或曰河車千萬迎或曰水火相奔馳看看搖擺五臟氣一旦腦瀉精神羸當初神祖留丹訣無中生有作丹基何曾有此鬼怪狀盡是下士徒闡提我聞前代諸聖師無為之中無不為盡於無相生實相不假想化並行持則有些兒奇又奇心腎元來非坎離肝心脾肺腎腸膽只是空屋舊藩籬涕唾津精氣血液只可接助為階梯精神魂魄心意氣觀之自是而實非何須內觀及鑑形或聽靈響視泓池吞霞飲露服元氣功效不驗心神疲演説清虛弄爐火索人投狀齎金寶敢將蛙草藐滄溟元始天尊即是我虛收銜號偽神通指劃鬼神説因果今朝明朝又奏名內丹外丹無不可欺賢罔聖昧三光自視禍福皆懡㦬招邀徒弟走市廛醉酒飽德成群夥大道從來絶名相真仙本自無花草教他戒誓立辛勤爭如汝自辛勤好一人迷昧猶自可迷以傳迷迷至老此輩一盲引衆盲共入迷途真憂惱忽朝福盡罪報來獲罪於天無所禱三元九府録其愆迫魄繫魄受冥考舉世人人喜學仙幾人日日去參玄各自妄誕自相高不務真實為真詮古人好語須切記工夫純熟語通仙言語不通非眷屬工夫不到不方圓我昔工夫行一年六脈已息氣歸根有一嬰兒在丹田與我形貌亦如然翻思塵塵學道者三年九載空遷延依前雲水遊四海冷眼看有誰堪傳炷香問道仍下風勘辨邪正知愚賢歸來作此翠虛吟猶如杲日麗青天掃除末學小伎術分别火候鍊藥物只取一味水中金收拾虛無造化窟促將百脈盡歸源脈任氣停丹始結初時枯木依寒巖二獸相逢如電掣中央正位産玄珠浪靜風平雲雨歇半時之間見丹頭軟似綿團硬似鐵此時南方赤鳳血採之須要知時節一般才得萬般全復命歸根真孔穴內中自有真壺天風物光明月皎潔龍吟虎嘯鉛汞交灼見黃芽芽白雪每常天地交合時奪取隂陽造化機卯酉甲庚須沐浴弦望晦朔要防危隨日隨時則斤兩抽添運用在怡怡十二時中只一時九還七返這些兒溫養功須常固濟巽風常向坎中吹行坐寢食總如之性恐火冷丹力遲一年周天除卯酉九轉工夫月用九至於十月玉霜飛聖胎圓就風雷吼一載胎生一箇兒子生孫了又孫枝千百億化最妙處豈可容易教人知忘形死心絶爾汝存亡動靜分賔主朝昏藥物有浮沉水火爻符宜檢舉真氣薰蒸無寒暑純陽流溢無生死有一子母分胎路妙在尾箕斗牛女若欲延年救老殘斷除淫欲行旁門果將流形永住世除非運火鍊神丹神丹之功三百日七解七蛻成大還聚則成形散成氣天上人間總一般寧可求師安樂法不可邪淫採精血古云天地悉皆歸須學無為清淨訣縛住青山萬頃雲撈取碧潭一輪月玄關一竅無人知此是刀圭甚奇絶夜來撞見吕秀才有一丹訣猶奇哉却把太虛為爐鼎活捉烏兔為藥材山河大地發猛火於中萬象生雲雷昔時混沌今品物一時交結成聖胎也無金木相間隔也無龍虎分南北不問子母及雌雄不問夫妻及黑白何人名曰大還丹太上老君吞不得老君留與清間客服了飛仙登太極更將一盞鴻濛酒餌此刀圭壯顔色任從滄海變桑田我道壺中未一年懸知汝心如鐵堅所以口口密相傳妙處都無半句子神仙法度真自然速須下手結胎仙朗吟歸去蓬萊天丹基歸一論古人有言得其一萬事畢噫誠哉是言也此吾所以刻丹經之繁蕪標紫書之樞要蓋為是也一也者金丹之基也實千經萬論之原千變萬化之祖也以要言之天魂地魄即日精月華也紅鉛黑汞即金精木液也烏兔即龜蛇也馬牛即龍虎也朱砂水銀乃黃芽白雪之骨也丹砂秋石乃白金黑錫之由也别之為男女夫婦體之為金木水火類之為青幽徐揚象之為乾坤坎離或曰河車者或黃輿者或有言交梨火棗者或有言金砂玉汞者又如丁翁黃婆之名嬰兒姹女之號拆為黑白分為青黃有如許之紛紛其實隂陽二字也是皆一物謂如守一壇戊己户玄關一竅玄牝之門神水華池鉛爐土釜朱砂鼎偃月爐中黃宫丹元府神室氣府關元丹田呼吸之根凝結之所此又皆一處也復如冬夏二至春秋兩分卯酉甲庚弦望晦朔子午巳亥寅子坤申二十四氣七十二候一年交合一月周回離坎之時兔雞之月乾巽之穴二八之門朝屯暮蒙晝姤夜復人不知以為果須依時按節推氣測候分拆數法準則銖爻故曰視土圭夜瞻刻漏謬之甚矣又豈知周年造化乃周身之精氣日夜時刻乃精氣之變態也其中有衰有旺有升降有浮沉有清有濁是以聖人以外象證之殊不知天地氣數在乎一時之工夫也所以中間有隂陽寒暑之證有生殺盈虧之狀小則按百刻大則如一年只在一時而然也然一時即一處也一處即一物也人知此之所以為一則採取有法運用有度斤兩有則水火有等與夫抽添進退之妙沐浴交結之奧不無防危慮險也若毫釐之失則日月失道金汞異爐非知造化之深者莫克知隂陽之義如是其祕也一隂一陽之謂道道即金丹也金丹即是也古仙上靈詔人鍊七返九還金液大丹者故乃入道之捷徑耳故有片餉工夫自然交媾回風混合百日工靈之語行之九月謂之九轉鍊之一年謂之聖胎此其所以隱而不露者以上天祕惜不欲輕泄此道耳豈得無禍福於傳授賢否之間乎即以唾涕精津氣血液為隂物也又以泥丸丹田心腎脾肺尾閭夾脊口鼻非真一處也何從而知金木之所以間隔水火之所以既未濟者能以一之一字訂諸群經參諸往哲勿以神氣為自然歸復勿以禪定為自然交合審能如是或恐暗合孫吳而終非促百脈以歸源窮九關而徹底三火所聚八水同歸者也至於神入氣為胎火鍊藥成丹豈容易明有曰神衛氣者有曰神凝則氣聚者有曰神氣自然歸復者皓首茫然反起虛無之歎夫豈知丹基之真一為妙哉若將遊浮靈揖華佺於空蒙盲靄之上者得一可以畢萬故作丹經歸一論以付學者白玉蟾潁川陳泥丸太乙刀圭之説傳諸後古云水調歌頭贈九霞子鞠九思奪取天機妙夜半看辰灼一些珠露阿誰運到稻花頭便向此時採取宛如碧蓮合蘂滴破玉池秋萬籟風初起明月一沙鷗紫河車乘赤鳳入瓊樓謂之玉汞與鉛與土正相投五氣三花聚頂吹著自然真火鍊得似紅榴十月胎仙出雷電送金虬鵲橋仙贈蟄虛子沙道昭紅蓮含蘂露珠凝碧飛落華池滴滴運歸金鼎唤丁公鍊得似一枚朱橘三花噴火五雲擁月上有金胎神室洞房雲雨正春風十箇月胎仙了畢真珠簾贈海南子白玉蟾金丹大藥人人有要須是心傳口授一片白龍肝一盞醍醐酒只向離無尋坎有移却南辰回北斗好笑見金翁姹女兩箇厮鬥些兒鉛汞調勻觀漢月海潮抽添火候一箭透三關方表神仙手兔子方來烏處住龜兒便把蛇吞了知否那兩箇鍾吕是吾師友金丹詩訣半斤真汞半斤鉛隱在靈源太極先須趁子時當採取鍊成金液入丹田神符白雪結玄珠此是金丹第一爐十二時辰須認子莫教金鼎汞花枯水火相交虎遇龍金翁姹女兩爭雄青去白來然後黑到紅方且入黃宫玉爐三轉見黃芽火裏紅蓮解發花人在絳宫貪夜月一杯美酒餌丹砂四轉紅爐轉四神添符進火養胎精龍虎繞爐爭造化巽風吹起水中燈五轉方成白馬芽却教六賊運河車五行俱備雷聲震正好登樓看汞花鍊成玉液玉神丹擒制龜蛇頃刻間已是中成消息處玉爐養火莫教寒天上七星地七寶竅權歸腦七返靈砂隂氣消鉛爐只使溫溫火八轉神錦玉淸砂卯酉抽添火不差渴飲華池飢嚼氣黃婆終日看金花九轉紫金成至寶天門地户自關瑣三百八十有四銖散為三萬六千顆青童把鏡照泥丸五臟祥雲徹上關子午寅申和巳亥胎圓數足出崑崙移將北斗向南辰穿過黃庭入紫庭攢簇一年真造化太陽正照月三更上應星辰下應鉛太陽三十六交躔不因法象無由採誰語生於天地先黃丹胡粉密陀僧此是嘉州造化能若不見陽真一法世間還有幾人曾紅鉛之髓名真汞黑汞之精是正鉛莫向腎中求造化却須心裏覓先天靈汞元非是水銀丹砂不赤太迷人此般真物誰能識識者驂鸞脫世塵三種真形一種稀結成靈異少人知莫言龍虎同源出便是神仙立兆基鎮星合得配中央偃水能交色變黃不比凡金銀與鐵成時全是賴隂陽莫近丘墳穢污田亦嫌戰地産人眠坤來靈氣形為福便是求仙小洞天山林靜處最宜良或在塵中或在鄉土德厚時丹得厚妄為立見有迍殃室宜向木對朝陽兌有明窗對夕光照顧有名人莫曉暮隂不得閉金墻八門運化應時開進退隨金定往來莫息明爐並百户安然二鼎位三台六百篇中起伏明三光須順日虛盈推移八卦明斤兩刻漏相參莫住程隂火息時陽火銷理分卧立順羲爻更隨黑白天邊月六候方終晦朔交四時推運逐星杓晝夜停分百刻昭鄭重元君重定式細詳時候已明標天上分明十二時人間分作鍊丹程若言刻漏無憑信不會玄機藥未成心地虛間絶萬緣且宜清靜返身觀要知鐵脊梁之漢何慮修丹下手難言者不知知不言高談闊論萬千般雖然眼下無人辨恐汝終身被自瞞人如得道自嬰兒不辨間言是與非君若不能心具眼他時追悔問他誰執著之人得不真朝行幕輟又非誠誠心修鍊見功驗方是人中識得人父精母血結胎成尚自他形似我形身內認吾真父母方才捉得五行精子時氣對尾閭關夾脊河車透頂門一顆水晶入爐內赤龍含汞上泥丸氣入丹田養白鴉斯時方曰結黃芽華池神水含明月取得刀圭大似麻須知藥得火成丹又要丹逢火則仙片餉工夫修便現老成須是過三年大道分明在眼前時人不會悮歸泉黃芽本是乾坤氣神水根基與汞連認得根源不用忙三三合九有純陽潛通變化神光現從此朝天近玉皇合其天地合其元子母相逢不敢言先汞後鉛為大道莫教失伴鶴歸天此寶從來二八傳吉年吉月入爐安十朝火候知時節必定芽成汞自完志默忘言理最端更無一物可相關回眸謾著些兒力一得分明萬事間紅鉛黑汞大丹基紅黑相投世罕知兩物若還成戊己仙家故曰一刀圭日烏月兔兩輪圓根在先天核取難月夜望中能採取天魂地魄結靈丹莫謂金丹事等間切須勤苦力鑽研殷勤好問師資學不在他邊在目前未鍊還丹先養鉛龜蛇一氣産先天虛心實腹方和合結就靈砂一粒圓同行同坐又同眠終日相隨在目前認得這些須急採見之便是水鄉鉛不是燈光日月星藥靈自有異常明垂簾久視光明處一顆堂堂現本真終日如愚豈有無謾將間裏著工夫初時玉液飛空雪漸見流金滿故廬靈汞通真變化多只宜存守不宜過神符默運三關徹鉛趁黃河入大羅甲龍庚虎鎮相隨鉛汞同爐始可為曾取地天交泰事自然交媾坎和離周天火候至幽顯運動抽添盡有時氣候何須分八節只防片餉失毫釐五行四象坎並離詩訣分明説與伊只有工夫下手處幾人會得幾人知若未逢師且看詩詩中藏訣好修持雖然不到蓬萊路也得人間死較遲晝運靈旗夜火芝抽添運用且防危若無同志相親賞時照爐中火候非震卦行歸西兌鄉三陽姹女弄明璫巽風吹動珊瑚樹入艮歸坤又一場握拳閉目守流珠這箇元來是入途不見悟真篇內説真金起屋幾時枯誰知前短後長機十二時中只一時晦朔望弦明進退鍊成九轉結嬰兒崑崙山上火星飛金木相逢坎電時藥到月圓須滿稱急教進火莫蹉遲大藥須憑神氣精採來一處結交成丹頭只是先天氣鍊作黃芽發玉英分明只在片言間老去殊途有易難先自刀圭言下悟漸收九轉大還丹兩處擒來共一爐一泓真水結真酥刀圭滋味吞歸腹澆灌黃芽産玉符捉將百脈倒歸源自會天然汞見鉛大地山河皆至寶誰知身裏覓先天宫中眼底火星飛雷電掀翻白雪垂身裏漏聲聞滴滴三尸精血可充飢五行四象外邊尋只在當人一寸心運用隂陽成妙道直教瓦礫盡成金偃月爐中煅坎離片時自有一刀圭寄言師祖張平叔萬聖千賢總在西醉倒酣眠夢熟時滿船載寶過曹溪一才識破丹基處放去收來絶在伊西南路上月華明大藥還從此處生記得古人詩一句曲江之上鵲橋橫一月三旬一日同修丹法象奪天功交加二八為丹母望遠徒勞覓虎龍尾閭白氣貫丹田一顆真珠軟似綿滿地冷光生玉笋兩池秋水漾紅蓮鼎爐火候密推排鍊得純陽氣上來地户閉時骨體實天門積漸自然開水為靈符沖和液火是丹樞混沌精會在宫中凝結處自然結蘂復生英男兒懷孕是胎仙只為蟾光夜夜圓奪得天機真造化身中自有玉清天鼎中朱橘亘天紅此是時時養火功元氣歸爐神不散春山春水自春風金鼎先乾活水銀水銀乾了大丹成分明有箇長生草點鐵成金不悮人涕唾精津氣血液真偽混淆須辨惑從無生有是藥材不可滯他虛幻物經文變化在須臾迷者何求日月疏但守火爻三百刻産成一顆夜明珠天源一派接崑崙最隱無過九曲灣百萬玉龍嘶未斷一江春月趁漁船精神冥合氣歸時骨肉融和都不知關節自開通暢也形容光澤似嬰兒分兩須當應兩弦此般法象合天淵回頭問取黃婆看何必區區待口傳鉛汞之宗龍虎根玄牝之户戊己門只向玉壺春色裏摘枝花去問羲軒近則三朝遠九旬須知變化有時辰不知造化長生藥瀨汞成金也動人鼎鼎元無藥裏尋尋來出去一般金鑄成大小多隨意便是冰壺妙理深入鼎須憑重一斤稱來却是十六星一星水裏真金妙合作流珠二八停坎府坳塘石腳泉星斗相對射高天潺湲陽脈通青白沐浴要教金體堅盡道真人總默然如何也不示言詮若不驕傲事無語只是胸中欠汞鉛天地初分日月高狀如難子復如桃隂陽真氣知時節直待三年脫戰袍龍虎丹砂義最幽五神金內汞鉛流千朝變紫飛雲去直至大羅天上頭用鉛須得汞相和二姓為親女唱歌鍊到紫河車地動白雲相伴鶴來過紅黑相將婦嫁夫一年一度入丹樞洞房深處真雲雨産箇嬰兒一似渠坎男離女住乾天買藥燒丹不用錢偃月爐中烹造化一些妙藥要真鉛怪事教人笑幾回男兒今也會懷胎自家精血自交結身裏夫妻是妙哉三姓包含二物交赤龍飛上碧雲霄夜來甘露空中過片月橫空對鵲橋復姤修持水火宗兔雞沐浴內丹紅周天六六寒爐後十月胎圓顯聖功水火同精間木金火木知他甚處尋脫黃著紫因何事只為河車數轉深玉符金液鍊天仙月照昆崘一沼蓮試指北方玄武事龜蛇因甚兩相纏雨洗新篁雙鳳飛玉芝花下一靈龜抱琴彈盡舞仙曲却放姮娥脊小池透體金光骨髓香金筋玉骨盡純陽鍊教赤白流為白隂氣消磨身自康一旦工夫盡志誠凝神聚氣固真精顔容如玉無飢渴方顯金丹片餉成翠娥獨立水晶宫體態嬌嬈有意濃半夜黃婆來叩户作媒嫁去與金翁太乙玄珠金液丹還元返本駐童顔要須親聽明師語方可教君見一斑夜來一朵碧芙蕖內有紅丸滴滴珠滴下華池是神水丹田結聚作丹樞離坎名為水火精本是乾坤二卦成但取坎精點離穴純乾便可攝飛瓊翠虛篇
